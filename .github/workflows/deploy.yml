name: Deploy add-in to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # so git rev-list --count HEAD sees full history

      - name: Build static site into ./dist
        run: |
          set -euo pipefail
          mkdir -p dist
          cp -R src/. dist/
          cp manifest.xml dist/manifest.xml
          touch dist/.nojekyll
          SHA="$(git rev-parse --short HEAD)"
          TS="$(date -u +%Y%m%d%H%M%S)"
          BUILD="$(git rev-list --count HEAD)"
          VERSION="${SHA}-${TS}"
          MANIFEST_VERSION="2.0.${BUILD}.0"   # OfficeApp <Version> must be N.N.N.N
          ISO_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Stamping VERSION=$VERSION  MANIFEST=$MANIFEST_VERSION"

          # Cache-bust placeholders in served files (HTML/JS/CSS)
          find dist -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" \) -print0 \
            | xargs -0 sed -i "s/DEPLOY_VERSION/$VERSION/g"

          # Stamp the OfficeApp <Version> in the deployed manifest so the user
          # can verify in 'My add-ins' (Outlook) AND on the install page that
          # they downloaded the latest build. Source manifest keeps 2.0.0.0.
          sed -i "s|<Version>2.0.0.0</Version>|<Version>${MANIFEST_VERSION}</Version>|" dist/manifest.xml

          # Stamp app version + build info into JS config
          sed -i "s/version: '2.0.0'/version: '$MANIFEST_VERSION'/" dist/js/config.js || true

          # Plain VERSION file (legacy) + richer release-info.json for the install page
          echo "$VERSION" > dist/VERSION
          cat > dist/release-info.json <<EOF
          {
            "manifestVersion": "${MANIFEST_VERSION}",
            "buildId": "${VERSION}",
            "commit": "${SHA}",
            "deployedAt": "${ISO_TIME}",
            "manifestUrl": "https://ghazalawy.github.io/prizm-outlook-addin/manifest.xml"
          }
          EOF
          ls -la dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
