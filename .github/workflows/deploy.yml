name: Deploy add-in to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static site into ./dist
        run: |
          set -euo pipefail
          mkdir -p dist
          cp -R src/. dist/
          cp manifest.xml dist/manifest.xml
          touch dist/.nojekyll
          VERSION="$(git rev-parse --short HEAD)-$(date -u +%Y%m%d%H%M%S)"
          echo "Stamping version $VERSION"
          # Cache-bust: replace DEPLOY_VERSION placeholders so Outlook re-fetches assets on every deploy
          find dist -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" \) -print0 \
            | xargs -0 sed -i "s/DEPLOY_VERSION/$VERSION/g"
          # Stamp version into the JS config as the actual displayed app version
          sed -i "s/version: '2.0.0'/version: '$VERSION'/" dist/js/config.js || true
          echo "$VERSION" > dist/VERSION
          ls -la dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
